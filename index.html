<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>T&K Repair Cloud - ระบบงานซ่อมและออกบิล</title>
    <!-- Tailwind CSS สำหรับดีไซน์ที่ทันสมัย -->
    <script src="https://tailwindcss.com"></script>
    <!-- Font Awesome สำหรับไอคอน -->
    <link rel="stylesheet" href="https://cloudflare.com">
    <!-- QR Code Generator -->
    <script src="https://cloudflare.com"></script>
    <!-- HTML5-QRCode Scanner สำหรับสแกนผ่านกล้องมือถือ -->
    <script src="https://unpkg.com"></script>
    <!-- html2canvas สำหรับแปลงบิลเป็นรูปภาพเพื่อส่งใน Line -->
    <script src="https://cloudflare.com"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { primary: '#4F46E5', success: '#10B981', danger: '#EF4444' }
                }
            }
        }
    </script>
</head>
<body class="bg-slate-50 font-sans text-slate-800 antialiased min-h-screen">

    <!-- Navigation Bar -->
    <nav class="bg-white shadow-sm border-b border-slate-200 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16 items-center">
                <div class="flex items-center gap-2">
                    <i class="fa-solid fa-screwdriver-wrench text-primary text-2xl"></i>
                    <span class="text-xl font-bold bg-gradient-to-r from-primary to-blue-600 bg-clip-text text-transparent">T&K Repair Cloud</span>
                </div>
                <div class="flex gap-2">
                    <button onclick="openModal('jobModal')" class="bg-primary hover:bg-indigo-700 text-white px-4 py-2 rounded-xl text-sm font-medium transition-all shadow-sm flex items-center gap-2">
                        <i class="fa-solid fa-plus"></i> เพิ่มงานซ่อมใหม่
                    </button>
                    <button onclick="startScanner()" class="bg-slate-800 hover:bg-slate-950 text-white px-4 py-2 rounded-xl text-sm font-medium transition-all shadow-sm flex items-center gap-2">
                        <i class="fa-solid fa-qrcode"></i> สแกนบาร์โค้ดเครื่อง
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content Container -->
    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        
        <!-- Search and Status Section -->
        <div class="bg-white p-4 rounded-2xl shadow-sm border border-slate-200 mb-6 flex flex-col md:flex-row gap-4 items-center justify-between">
            <div class="relative w-full md:w-96">
                <i class="fa-solid fa-magnifying-glass absolute left-4 top-3.5 text-slate-400"></i>
                <input type="text" id="searchInput" onkeyup="searchJobs()" placeholder="ค้นหาชื่อลูกค้า, รุ่นอุปกรณ์, หรือรหัสเครื่อง..." class="w-full pl-11 pr-4 py-2.5 rounded-xl border border-slate-200 focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all text-sm">
            </div>
            <div id="dbStatus" class="text-xs font-medium text-emerald-600 bg-emerald-50 px-3 py-1.5 rounded-lg border border-emerald-100 flex items-center gap-1.5">
                <i class="fa-solid fa-circle text-[8px] animate-ping text-emerald-500"></i> เชื่อมต่อฐานข้อมูล Cloud สำเร็จ
            </div>
        </div>

        <!-- Camera Scanner Modal Overlay -->
        <div id="scannerContainer" class="hidden fixed inset-0 bg-black/60 z-50 flex items-center justify-center p-4">
            <div class="bg-white p-6 rounded-2xl max-w-md w-full shadow-2xl relative">
                <button onclick="stopScanner()" class="absolute top-4 right-4 text-slate-400 hover:text-slate-600"><i class="fa-solid fa-xmark text-xl"></i></button>
                <h3 class="text-lg font-bold mb-4 flex items-center gap-2"><i class="fa-solid fa-camera"></i> สแกน QR Code / Barcode</h3>
                <div id="reader" class="overflow-hidden rounded-xl bg-slate-100"></div>
            </div>
        </div>

        <!-- Grid Items Data List -->
        <h2 class="text-lg font-bold mb-4 text-slate-700 flex items-center gap-2">
            <i class="fa-solid fa-list-check text-slate-400"></i> รายการงานซ่อมของร้านทั้งหมด
        </h2>
        <div id="jobList" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <div class="col-span-full text-center py-12 text-slate-400">
                <i class="fa-solid fa-circle-notch animate-spin text-2xl mb-2"></i>
                <p>กำลังดึงข้อมูลเรียลไทม์จาก Cloud เซิร์ฟเวอร์...</p>
            </div>
        </div>
    </main>

    <!-- Modal: ลงทะเบียนและแก้ไขงานซ่อม -->
    <div id="jobModal" class="hidden fixed inset-0 bg-black/50 backdrop-blur-sm z-50 flex items-center justify-center p-4 overflow-y-auto">
        <div class="bg-white rounded-2xl max-w-2xl w-full max-h-[90vh] overflow-y-auto p-6 shadow-2xl border border-slate-100">
            <div class="flex justify-between items-center pb-4 border-b border-slate-100">
                <h3 class="text-xl font-bold text-slate-800" id="modalTitle">ลงทะเบียนงานซ่อมใหม่</h3>
                <button onclick="closeModal('jobModal')" class="text-slate-400 hover:text-slate-600"><i class="fa-solid fa-xmark text-xl"></i></button>
            </div>
            <form id="jobForm" onsubmit="saveJob(event)" class="space-y-4 pt-4">
                <input type="hidden" id="jobId">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-1">ชื่อลูกค้า</label>
                        <input type="text" id="customerName" required class="w-full p-3 rounded-xl border border-slate-200 text-sm focus:ring-2 focus:ring-primary/20 outline-none">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-1">เบอร์โทรศัพท์ลูกค้า</label>
                        <input type="tel" id="customerPhone" required class="w-full p-3 rounded-xl border border-slate-200 text-sm focus:ring-2 focus:ring-primary/20 outline-none">
                    </div>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-1">ประเภทเครื่องใช้ไฟฟ้า</label>
                        <select id="deviceType" class="w-full p-3 rounded-xl border border-slate-200 text-sm focus:ring-2 focus:ring-primary/20 outline-none bg-white">
                            <option value="📺 TV REPAIR">📺 ทีวี / โทรทัศน์</option>
                            <option value="🧺 WASHING MACHINE">🧺 เครื่องซักผ้า</option>
                            <option value="❄️ FRIDGE REPAIR">❄️ ตู้เย็น / ตู้แช่</option>
                            <option value="🍃 A/C SERVICE">🍃 แอร์ / เครื่องปรับอากาศ</option>
                            <option value="💨 FAN REPAIR">💨 พัดลม</option>
                            <option value="🛠️ OTHER">🛠️ อุปกรณ์ไฟฟ้าอื่นๆ</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-1">ระบุแบรนด์ / รุ่น / รายละเอียด</label>
                        <input type="text" id="deviceBrand" required placeholder="เช่น Samsung 55 นิ้ว / ฝาหน้า LG 12kg" class="w-full p-3 rounded-xl border border-slate-200 text-sm focus:ring-2 focus:ring-primary/20 outline-none">
                    </div>
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-1">หมายเลขเครื่องประจำชิ้นงาน (Serial / Barcode เพื่อใช้สแกน)</label>
                    <input type="text" id="barcode" placeholder="ระบุเลขซีเรียล หรือแสกนบาร์โค้ดสินค้าเพื่อบันทึก" class="w-full p-3 rounded-xl border border-slate-200 text-sm focus:ring-2 focus:ring-primary/20 outline-none">
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-1">อาการเสียที่แจ้ง / รายการซ่อม</label>
                    <textarea id="issue" rows="2" required placeholder="แจ้งอาการเสียอย่างละเอียด หรือระบุงานเปลี่ยนอะไหล่ชิ้นไหน" class="w-full p-3 rounded-xl border border-slate-200 text-sm focus:ring-2 focus:ring-primary/20 outline-none"></textarea>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-1">สถานะความคืบหน้า</label>
                        <select id="status" class="w-full p-3 rounded-xl border border-slate-200 text-sm focus:ring-2 focus:ring-primary/20 outline-none bg-white">
                            <option value="รับงาน">📥 รับงานซ่อม</option>
                            <option value="กำลังซ่อม">👨‍🔧 กำลังดำเนินการซ่อม</option>
                            <option value="ซ่อมเสร็จ">✅ ซ่อมเสร็จเรียบร้อย</option>
                            <option value="ส่งมอบแล้ว">📦 ส่งมอบคืนลูกค้าแล้ว</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-1">รวมค่าบริการและค่าอะไหล่ (บาท)</label>
                        <input type="number" id="cost" value="0" class="w-full p-3 rounded-xl border border-slate-200 text-sm focus:ring-2 focus:ring-primary/20 outline-none">
                    </div>
                </div>
