<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>T&K Repair Suite & CMMS Ecosystem</title>
    <!-- โหลดฟอนต์ Prompt -->
    <link href="https://googleapis.com" rel="stylesheet">
    <!-- โหลดไลบรารี html2canvas -->
    <script src="https://cloudflare.com"></script>
    <style>
        * { box-sizing: border-box; font-family: 'Prompt', sans-serif; margin: 0; padding: 0; }
        body { background-color: #030712; color: #f1f5f9; padding: 20px 20px 90px 20px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; background-image: radial-gradient(circle at top right, rgba(0, 229, 255, 0.05), transparent), radial-gradient(circle at bottom left, rgba(255, 215, 0, 0.03), transparent); }
        
        .w-full-md { width: 100%; max-width: 440px; }
        
        /* สลับหน้าจอซ่อน/แสดง */
        .app-page { display: none; width: 100%; max-width: 440px; }
        .app-page.active { display: block; }
        
        /* แผงควบคุมดีไซน์กระจก (Cyberpunk Control Panel) */
        .glass-panel { background: linear-gradient(135deg, rgba(15, 23, 42, 0.85), rgba(30, 41, 59, 0.85)); backdrop-filter: blur(16px); border: 1px solid rgba(0, 229, 255, 0.2); border-radius: 24px; padding: 24px; margin-bottom: 24px; box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5); position: relative; overflow: hidden; }
        .glass-panel::before { content: ''; position: absolute; top: 0; left: 0; width: 4px; height: 100%; background: linear-gradient(#00E5FF, #ffd700); }
        
        .form-title { font-size: 18px; font-weight: 700; color: #00E5FF; margin-bottom: 16px; text-shadow: 0 0 10px rgba(0, 229, 255, 0.4); }
        .form-group { margin-bottom: 14px; }
        .form-group label { display: block; font-size: 11px; font-weight: 500; color: #94a3b8; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 0.5px; }
        
        .form-input { width: 100%; background: rgba(15, 23, 42, 0.6); border: 1px solid #334155; border-radius: 12px; padding: 12px; color: #fff; font-size: 14px; outline: none; }
        .form-input:focus { border-color: #00E5FF; box-shadow: 0 0 10px rgba(0, 229, 255, 0.2); }
        .grid-2 { display: grid; grid-template-cols: 1fr 1fr; gap: 12px; }
        .grid-3 { display: grid; grid-template-cols: 1fr 1fr 1fr; gap: 8px; }
        
        /* สไตล์ปุ่มตัวเลือกเปิด/ปิด */
        .toggle-btn-group { display: flex; background: rgba(15, 23, 42, 0.8); padding: 4px; border-radius: 8px; border: 1px solid #334155; margin-bottom: 10px; }
        .toggle-btn { flex: 1; padding: 8px; border: none; background: transparent; color: #94a3b8; font-size: 11px; font-weight: 600; cursor: pointer; border-radius: 6px; text-align: center; }
        .toggle-btn.active { background: #2563eb; color: #fff; box-shadow: 0 2px 8px rgba(37, 99, 235, 0.4); }
        
        /* ปุ่มจัดการสถานะแจ้งเตือนส่ง LINE */
        .status-btn-group { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 8px; }
        .status-btn { padding: 6px 12px; border: 1px solid #334155; background: rgba(15, 23, 42, 0.6); color: #94a3b8; font-size: 11px; font-weight: 500; cursor: pointer; border-radius: 6px; }
        .status-btn.active { background: #10b981; color: #fff; border-color: #10b981; box-shadow: 0 2px 8px rgba(16, 185, 129, 0.4); }
        
        /* บล็อกแสดงพรีวิวพิมพ์ข้อความเพื่อแชร์ */
        .noti-box-preview { background: rgba(0, 0, 0, 0.25); border: 1px solid #10b981; border-radius: 12px; padding: 12px; font-size: 12px; color: #10b981; margin-bottom: 14px; cursor: pointer; display: none; }
        
        .file-upload-btn { display: block; text-align: center; padding: 12px; background: rgba(0, 229, 255, 0.05); border: 1px dashed #00E5FF; border-radius: 12px; color: #00E5FF; font-size: 13px; font-weight: 500; cursor: pointer; margin-bottom: 14px; }
        
        .btn-update { width: 100%; background: linear-gradient(90deg, #00E5FF, #3b82f6); color: #030712; font-weight: 700; padding: 14px; border: none; border-radius: 12px; cursor: pointer; font-size: 14px; margin-top: 8px; box-shadow: 0 4px 15px rgba(0, 229, 255, 0.3); }
        .btn-update:active { transform: scale(0.98); }
        .btn-export { width: 100%; background: linear-gradient(90deg, #ffd700, #f59e0b); color: #030712; font-weight: 800; padding: 16px; border: none; border-radius: 16px; cursor: pointer; font-size: 16px; box-shadow: 0 6px 25px rgba(255, 215, 0, 0.3); text-align: center; margin-top: 15px; margin-bottom: 35px; }
        .btn-export:active { transform: scale(0.98); }
        
        /* โครงสร้างตัวบิลใบแจ้งงานดิจิทัลแบรนด์ T&K */
        #invoiceContainer { background: #090d16; border: 2px solid #1e293b; border-radius: 24px; padding: 28px; position: relative; box-shadow: 0 20px 50px rgba(0,0,0,0.6); }
        .bill-header { text-align: center; border-bottom: 1px solid rgba(51, 65, 85, 0.5); padding-bottom: 16px; margin-bottom: 16px; }
        .bill-title { font-size: 22px; font-weight: 800; background: linear-gradient(90deg, #ffd700, #00E5FF); -webkit-background-clip: text; -webkit-text-fill-color: transparent; letter-spacing: 1px; text-shadow: 0 2px 10px rgba(0,229,255,0.1); }
        .bill-subtitle { font-size: 10px; color: #ffd700; margin-top: 4px; font-weight: 600; letter-spacing: 0.5px; }
        .bill-badge { display: inline-block; background: rgba(255, 215, 0, 0.08); color: #ffd700; font-size: 11px; padding: 4px 16px; border-radius: 9999px; border: 1px solid rgba(255, 215, 0, 0.2); font-weight: 600; margin-top: 10px; }
        
        .flex-between { display: flex; justify-content: space-between; align-items: center; }
        .text-xs { font-size: 12px; color: #64748b; }
        .text-white { color: #f8fafc; font-weight: 500; }
        
        .info-card { background: rgba(15, 23, 42, 0.4); border: 1px solid rgba(51, 65, 85, 0.4); border-radius: 16px; padding: 14px; margin-bottom: 16px; font-size: 12px; }
        .info-line { margin-bottom: 6px; display: flex; align-items: flex-start; }
        .info-line:last-child { margin-bottom: 0; }
        .info-label { color: #64748b; width: 95px; flex-shrink: 0; font-weight: 500; }
        .info-value { color: #e2e8f0; }
        .divider { border-top: 1px dashed rgba(51, 65, 85, 0.5); margin: 10px 0; padding-top: 10px; }
        
        #billImagePreview { display: none; width: 100%; max-height: 180px; object-fit: cover; border-radius: 12px; border: 1px solid rgba(51, 65, 85, 0.5); margin-bottom: 16px; }
        .section-title { font-size: 11px; color: #00E5FF; font-weight: 600; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 1px; padding-left: 2px; }
        
        /* รายการอะไหล่สไตล์โมเดิร์น 10 ช่องตามกระดาษจริง */
        .part-list-grid { display: grid; grid-template-cols: 1fr 1fr; gap: 8px 16px; background: rgba(15, 23, 42, 0.5); padding: 14px; border-radius: 14px; border: 1px solid rgba(51, 65, 85, 0.4); margin-bottom: 16px; font-size: 11px; color: #64748b; }
        .part-item { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; padding: 2px 0; }
        .part-item.active { color: #e2e8f0; }
        
        /* ตารางแจกแจงราคาแยกประเภท */
        .cost-breakdown { font-size: 12px; border-top: 1px solid rgba(51, 65, 85, 0.4); border-bottom: 1px solid rgba(51, 65, 85, 0.4); padding: 12px 4px; margin-bottom: 16px; }
        .cost-row { display: flex; justify-content: space-between; margin-bottom: 6px; }
        .cost-row:last-child { margin-bottom: 0; }
        .cost-label { color: #cbd5e1; }
        .cost-value { color: #f8fafc; }

        /* กล่องยอดเงินสุทธิแบรนด์พรีเมียมทองคำ */
        .total-box { background: linear-gradient(135deg, rgba(251, 191, 36, 0.05), rgba(217, 119, 6, 0.05)); border: 1px solid rgba(251, 191, 36, 0.3); border-radius: 16px; padding: 16px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
        .total-label { font-size: 13px; font-weight: 600; color: #fbbf24; }
        .total-amount { font-size: 20px; color: #fbbf24; font-weight: 700; text-shadow: 0 0 10px rgba(251, 191, 36, 0.2); }
        
        /* โซนลงลายเซ็นพนักงานและลูกค้า */
        .sign-section { display: grid; grid-template-cols: 1fr 1fr; gap: 20px; text-align: center; font-size: 11px; border-bottom: 1px solid rgba(51, 65, 85, 0.5); padding-bottom: 16px; margin-bottom: 16px; }
        .sign-title { color: #64748b; margin-bottom: 6px; font-weight: 500; }
        .sign-space { height: 45px; display: flex; align-items: center; justify-content: center; font-style: italic; font-size: 16px; font-weight: 500; }
        
        .warranty-box { font-size: 10px; color: #94a3b8; background: rgba(15, 23, 42, 0.6); padding: 12px; border-radius: 12px; border: 1px solid rgba(51, 65, 85, 0.4); margin-bottom: 20px; line-height: 1.6; }
        
        .footer-section { display: flex; justify-content: space-between; align-items: center; }
        .footer-contact { font-size: 10px; color: #64748b; line-height: 1.6; }
        .footer-contact-title { color: #ffd700; font-weight: 600; margin-bottom: 3px; }
        
        /* สัญลักษณ์คิวอาร์โค้ด */
        .qr-mock { width: 68px; height: 68px; border: 1px solid rgba(251, 191, 36, 0.4); padding: 6px; border-radius: 10px; background: #050811; display: flex; flex-direction: column; justify-content: space-between; }
        .qr-row { display: flex; justify-content: space-between; height: 18px; }
        .qr-block { width: 18px; height: 18px; background: #fbbf24; border-radius: 4px; }
        .qr-dot { width: 8px; height: 8px; background: #fbbf24; align-self: center; margin: auto; }
        .qr-text { font-size: 8px; color: #fbbf24; text-align: center; margin-top: 5px; }

        /* แถบเมนูด้านล่างสุดพรีเซนต์สุดล้ำ (Floating Bottom Navigation) */
