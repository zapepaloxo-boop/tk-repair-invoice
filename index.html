<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>T&K Repair Suite & CMMS Ecosystem</title>
    <!-- โหลดฟอนต์ Prompt -->
    <link href="https://googleapis.com" rel="stylesheet">
    <!-- โหลดไลบรารี html2canvas สำหรับเซฟภาพบิลความละเอียดสูง -->
    <script src="https://cloudflare.com"></script>
    <style>
        * { box-sizing: border-box; font-family: 'Prompt', sans-serif; margin: 0; padding: 0; }
        body { background-color: #030712; color: #f1f5f9; padding: 10px 10px 80px 10px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; background-image: radial-gradient(circle at top right, rgba(0, 229, 255, 0.05), transparent), radial-gradient(circle at bottom left, rgba(255, 215, 0, 0.03), transparent); }
        
        .w-full-md { width: 100%; max-width: 440px; }
        
        /* ระบบจัดการสถานะแสดงผลสลับหน้าจอ (Multi-Page Component) */
        .app-page { display: none; width: 100%; max-width: 440px; }
        .app-page.active { display: block; }
        
        /* สไตล์กรอบคอนโซลแบบกระจกเรืองแสงพรีเมียม (Glassmorphism Neon Cyber) */
        .glass-panel { background: linear-gradient(135deg, rgba(15, 23, 42, 0.85), rgba(30, 41, 59, 0.85)); backdrop-filter: blur(16px); border: 1px solid rgba(0, 229, 255, 0.2); border-radius: 20px; padding: 20px; margin-bottom: 20px; box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5); position: relative; overflow: hidden; }
        .glass-panel::before { content: ''; position: absolute; top: 0; left: 0; width: 4px; height: 100%; background: linear-gradient(#00E5FF, #3b82f6); }
        
        .form-title { font-size: 16px; font-weight: 700; color: #00E5FF; margin-bottom: 14px; text-shadow: 0 0 10px rgba(0, 229, 255, 0.3); display: flex; align-items: center; gap: 6px; }
        .form-group { margin-bottom: 12px; }
        .form-group label { display: block; font-size: 11px; font-weight: 500; color: #94a3b8; margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.5px; }
        
        /* อินพุตข้อมูลช่าง */
        .form-input { width: 100%; background: rgba(15, 23, 42, 0.6); border: 1px solid #334155; border-radius: 10px; padding: 10px; color: #fff; font-size: 13px; outline: none; }
        .form-input:focus { border-color: #00E5FF; box-shadow: 0 0 8px rgba(0, 229, 255, 0.2); }
        .grid-2 { display: grid; grid-template-cols: 1fr 1fr; gap: 10px; }
        .grid-3 { display: grid; grid-template-cols: 1fr 1fr 1fr; gap: 8px; }
        
        /* สไตล์ปุ่มตัวเลือกฟังก์ชันคัดลอกมาจากดีไซน์ Factorium ของพี่ */
        .toggle-btn-group { display: flex; background: rgba(15, 23, 42, 0.8); padding: 4px; border-radius: 8px; border: 1px solid #334155; margin-bottom: 10px; }
        .toggle-btn { flex: 1; padding: 8px; border: none; background: transparent; color: #94a3b8; font-size: 11px; font-weight: 600; cursor: pointer; border-radius: 6px; text-align: center; }
        .toggle-btn.active { background: #2563eb; color: #fff; box-shadow: 0 2px 8px rgba(37, 99, 235, 0.4); }
        
        /* ปุ่มจัดการสถานะแจ้งเตือนส่ง LINE */
        .status-btn-group { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 8px; }
        .status-btn { padding: 6px 10px; border: 1px solid #334155; background: rgba(15, 23, 42, 0.6); color: #94a3b8; font-size: 11px; font-weight: 500; cursor: pointer; border-radius: 6px; }
        .status-btn.active { background: #10b981; color: #fff; border-color: #10b981; box-shadow: 0 2px 8px rgba(16, 185, 129, 0.4); }
        
        /* บล็อกแสดงพรีวิวพิมพ์ข้อความเพื่อแชร์ */
        .noti-box-preview { background: rgba(0, 0, 0, 0.25); border: 1px solid #10b981; border-radius: 10px; padding: 10px; font-size: 12px; color: #10b981; margin-bottom: 12px; cursor: pointer; display: none; }
        
        /* ปุ่มเปิดกล้องอัปโหลดรูปหน้างาน */
        .file-upload-btn { display: block; text-align: center; padding: 10px; background: rgba(0, 229, 255, 0.05); border: 1px dashed #00E5FF; border-radius: 10px; color: #00E5FF; font-size: 12px; font-weight: 500; cursor: pointer; margin-bottom: 12px; }
        
        .btn-update { width: 100%; background: linear-gradient(90deg, #00E5FF, #3b82f6); color: #030712; font-weight: 700; padding: 12px; border: none; border-radius: 10px; cursor: pointer; font-size: 14px; margin-top: 6px; }
        .btn-export { width: 100%; background: linear-gradient(90deg, #ffd700, #f59e0b); color: #030712; font-weight: 800; padding: 14px; border: none; border-radius: 14px; cursor: pointer; font-size: 15px; box-shadow: 0 5px 20px rgba(255, 215, 0, 0.3); text-align: center; margin-top: 15px; margin-bottom: 15px; }
        
        /* โครงสร้างตัวบิลใบแจ้งงานสไตล์โมเดิร์นวิบวับ */
        #invoiceContainer { background: #090d16; border: 2px solid #1e293b; border-radius: 20px; padding: 24px; position: relative; box-shadow: 0 15px 40px rgba(0,0,0,0.6); }
        .bill-header { text-align: center; border-bottom: 1px solid rgba(51, 65, 85, 0.5); padding-bottom: 14px; margin-bottom: 14px; }
        .bill-title { font-size: 20px; font-weight: 800; background: linear-gradient(90deg, #93c5fd, #00E5FF); -webkit-background-clip: text; -webkit-text-fill-color: transparent; letter-spacing: 1px; }
        .bill-badge { display: inline-block; background: rgba(0, 229, 255, 0.08); color: #00E5FF; font-size: 11px; padding: 4px 14px; border-radius: 9999px; border: 1px solid rgba(0, 229, 255, 0.2); font-weight: 600; margin-top: 8px; }
        
        .flex-between { display: flex; justify-content: space-between; align-items: center; }
        .text-xs { font-size: 12px; color: #64748b; }
        .text-white { color: #f8fafc; font-weight: 500; }
        
        .info-card { background: rgba(15, 23, 42, 0.4); border: 1px solid rgba(51, 65, 85, 0.4); border-radius: 14px; padding: 12px; margin-bottom: 14px; font-size: 12px; }
        .info-line { margin-bottom: 5px; display: flex; align-items: flex-start; }
        .info-line:last-child { margin-bottom: 0; }
        .info-label { color: #64748b; width: 95px; flex-shrink: 0; font-weight: 500; }
        .info-value { color: #e2e8f0; }
        .divider { border-top: 1px dashed rgba(51, 65, 85, 0.5); margin: 8px 0; padding-top: 8px; }
        
        /* จุดแสดงผลภาพหน้างานฝังลงบิลจริง */
        #billImagePreview { display: none; width: 100%; max-height: 160px; object-fit: cover; border-radius: 10px; border: 1px solid rgba(51, 65, 85, 0.4); margin-bottom: 14px; }
        .section-title { font-size: 11px; color: #00E5FF; font-weight: 600; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
        
        /* ระบบตารางอะไหล่ 10 แถวจากใบงานจริง */
        .part-list-grid { display: grid; grid-template-cols: 1fr 1fr; gap: 6px 12px; background: rgba(15, 23, 42, 0.5); padding: 12px; border-radius: 12px; border: 1px solid rgba(51, 65, 85, 0.4); margin-bottom: 14px; font-size: 11px; color: #64748b; }
        .part-item { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; padding: 1px 0; }
        .part-item.active { color: #e2e8f0; }
        
        /* สรุปแจกแจงแยกประเภทค่าใช้จ่าย 3 ช่อง */
        .cost-breakdown { font-size: 11px; border-top: 1px solid rgba(51, 65, 85, 0.4); border-bottom: 1px solid rgba(51, 65, 85, 0.4); padding: 10px 2px; margin-bottom: 14px; color: #cbd5e1; }
        .cost-row { display: flex; justify-content: space-between; margin-bottom: 5px; }
        .cost-row:last-child { margin-bottom: 0; }
        
        .total-box { background: linear-gradient(135deg, rgba(251, 191, 36, 0.05), rgba(217, 119, 6, 0.05)); border: 1px solid rgba(251, 191, 36, 0.3); border-radius: 14px; padding: 14px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .total-amount { font-size: 18px; color: #fbbf24; font-weight: 700; }
        
        .sign-section { display: grid; grid-template-cols: 1fr 1fr; gap: 16px; text-align: center; font-size: 11px; border-bottom: 1px solid rgba(51, 65, 85, 0.5); padding-bottom: 12px; margin-bottom: 12px; }
        .sign-space { height: 40px; display: flex; align-items: center; justify-content: center; font-style: italic; font-size: 15px; font-weight: 500; }
        .warranty-box { font-size: 10px; color: #94a3b8; background: rgba(15, 23, 42, 0.6); padding: 10px; border-radius: 12px; border: 1px solid rgba(51, 65, 85, 0.4); margin-bottom: 16px; line-height: 1.5; }
        
        .footer-section { display: flex; justify-content: space-between; align-items: center; }
        .qr-mock { width: 64px; height: 64px; border: 1px solid rgba(251, 191, 36, 0.4); padding: 5px; border-radius: 8px; background: #050811; display: flex; flex-direction: column; justify-content: space-between; }
        .qr-row { display: flex; justify-content: space-between; height: 16px; }
        .qr-block { width: 16px; height: 16px; background: #fbbf24; border-radius: 3px; }
        .qr-dot { width: 6px; height: 6px; background: #fbbf24; align-self: center; margin: auto; }

        /* ======================================================= */
        /* ดีไซน์หน้าจอที่ 2: ตรวจความคืบหน้า (งานคงค้าง) คัดลอกจาก Factorium */
        /* ======================================================= */
        .dashboard-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; border-bottom: 1px solid #1e293b; padding-bottom: 10px; }
        .dashboard-badge { background: #10b981; color: white; padding: 4px 10px; border-radius: 6px; font-size: 11px; font-weight: 600; }
        .task-row { display: flex; align-items: center; background: rgba(30, 41, 59, 0.4); border: 1px solid #1e293b; border-radius: 14px; padding: 14px; margin-bottom: 10px; gap: 12px; }
