<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>T&K Repair App - ระบบงานซ่อมและออกบิล</title>
    <!-- ใช้ Tailwind CSS Play CDN v3 ที่เสถียรที่สุด -->
    <script src="https://tailwindcss.com"></script>
    <!-- Font Awesome สำหรับไอคอน -->
    <link rel="stylesheet" href="https://cloudflare.com">
    <!-- QR Code Generator -->
    <script src="https://cloudflare.com"></script>
    <!-- html2canvas สำหรับแปลงบิลเป็นรูปภาพเพื่อส่งใน Line -->
    <script src="https://cloudflare.com"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { 
                        primary: '#4F46E5', 
                        success: '#10B981', 
                        danger: '#EF4444' 
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-slate-50 font-sans text-slate-800 antialiased min-h-screen">

    <!-- Navigation Bar -->
    <nav class="bg-white shadow-md border-b border-slate-200 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16 items-center">
                <div class="flex items-center gap-2">
                    <i class="fa-solid fa-screwdriver-wrench text-primary text-xl"></i>
                    <span class="text-lg font-bold bg-gradient-to-r from-primary to-blue-600 bg-clip-text text-transparent">T&K Repair App</span>
                </div>
                <div>
                    <button onclick="openModal('jobModal')" class="bg-primary hover:bg-indigo-700 text-white px-4 py-2 rounded-xl text-xs font-semibold transition-all shadow-sm flex items-center gap-1">
                        <i class="fa-solid fa-plus"></i> เพิ่มงานซ่อมใหม่
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content Container -->
    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6">
        
        <!-- Search Section -->
        <div class="bg-white p-4 rounded-2xl shadow-sm border border-slate-200 mb-6">
            <div class="relative w-full">
                <i class="fa-solid fa-magnifying-glass absolute left-4 top-3.5 text-slate-400"></i>
                <input type="text" id="searchInput" onkeyup="searchJobs()" placeholder="ค้นหาชื่อลูกค้า, รุ่นเครื่องใช้ไฟฟ้า, บาร์โค้ด..." class="w-full pl-11 pr-4 py-2.5 rounded-xl border border-slate-200 focus:outline-none focus:ring-2 focus:ring-primary/20 text-sm">
            </div>
        </div>

        <!-- Grid Items Data List -->
        <h2 class="text-base font-bold mb-3 text-slate-700 flex items-center gap-2">
            <i class="fa-solid fa-list-check text-slate-400"></i> รายการงานซ่อมทั้งหมดของร้าน
        </h2>
        <div id="jobList" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
            <!-- ข้อมูลจะถูกดึงมาแสดงที่นี่ผ่าน JavaScript -->
        </div>
    </main>

    <!-- Modal: ลงทะเบียนและแก้ไขงานซ่อม (ถูกซ่อนไว้เริ่มต้น จะแสดงเมื่อกดปุ่มเพิ่มงาน) -->
    <div id="jobModal" class="hidden fixed inset-0 bg-black/50 backdrop-blur-sm z-50 flex items-center justify-center p-4 overflow-y-auto">
        <div class="bg-white rounded-2xl max-w-xl w-full max-h-[90vh] overflow-y-auto p-5 shadow-2xl border border-slate-100">
            <div class="flex justify-between items-center pb-3 border-b border-slate-100">
                <h3 class="text-lg font-bold text-slate-800" id="modalTitle">ลงทะเบียนงานซ่อมใหม่</h3>
                <button type="button" onclick="closeModal('jobModal')" class="text-slate-400 hover:text-slate-600"><i class="fa-solid fa-xmark text-xl"></i></button>
            </div>
            <form id="jobForm" onsubmit="saveJob(event)" class="space-y-4 pt-3 text-sm">
                <input type="hidden" id="jobId">
                <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
                    <div>
                        <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-1">ชื่อลูกค้า</label>
                        <input type="text" id="customerName" required class="w-full p-2.5 rounded-xl border border-slate-200 text-sm focus:ring-2 focus:ring-primary/20 outline-none">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-1">เบอร์โทรศัพท์ลูกค้า</label>
                        <input type="tel" id="customerPhone" required class="w-full p-2.5 rounded-xl border border-slate-200 text-sm focus:ring-2 focus:ring-primary/20 outline-none">
                    </div>
                </div>
                <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
                    <div>
                        <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-1">ประเภทเครื่องใช้ไฟฟ้า</label>
                        <select id="deviceType" class="w-full p-2.5 rounded-xl border border-slate-200 text-sm focus:ring-2 focus:ring-primary/20 outline-none bg-white">
                            <option value="📺 TV REPAIR">📺 ทีวี / โทรทัศน์</option>
                            <option value="🧺 WASHING MACHINE">🧺 เครื่องซักผ้า</option>
                            <option value="❄️ FRIDGE REPAIR">❄️ ตู้เย็น / ตู้แช่</option>
                            <option value="🍃 A/C SERVICE">🍃 แอร์ / เครื่องปรับอากาศ</option>
                            <option value="💨 FAN REPAIR">💨 พัดลม</option>
                            <option value="🛠️ OTHER">🛠️ อุปกรณ์ไฟฟ้าอื่นๆ</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-1">ระบุแบรนด์ / รุ่น / รายละเอียด</label>
                        <input type="text" id="deviceBrand" required placeholder="เช่น Samsung 55 นิ้ว" class="w-full p-2.5 rounded-xl border border-slate-200 text-sm focus:ring-2 focus:ring-primary/20 outline-none">
                    </div>
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-1">หมายเลขเครื่องประจำชิ้นงาน (Serial / Barcode)</label>
                    <input type="text" id="barcode" placeholder="ระบุเลขซีเรียล หรือรหัสบาร์โค้ดเครื่องซ่อม" class="w-full p-2.5 rounded-xl border border-slate-200 text-sm focus:ring-2 focus:ring-primary/20 outline-none">
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-1">อาการเสียที่แจ้ง / รายการซ่อม</label>
                    <textarea id="issue" rows="2" required placeholder="แจ้งอาการเสียอย่างละเอียด หรือระบุงานเปลี่ยนอะไหล่" class="w-full p-2.5 rounded-xl border border-slate-200 text-sm focus:ring-2 focus:ring-primary/20 outline-none"></textarea>
                </div>
                <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
                    <div>
                        <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-1">สถานะความคืบหน้า</label>
                        <select id="status" class="w-full p-2.5 rounded-xl border border-slate-200 text-sm focus:ring-2 focus:ring-primary/20 outline-none bg-white">
                            <option value="รับงาน">📥 รับงานซ่อม</option>
                            <option value="กำลังซ่อม">👨‍🔧 กำลังดำเนินการซ่อม</option>
                            <option value="ซ่อมเสร็จ">✅ ซ่อมเสร็จเรียบร้อย</option>
                            <option value="ส่งมอบแล้ว">📦 ส่งมอบคืนลูกค้าแล้ว</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-1">รวมค่าบริการและค่าอะไหล่ (บาท)</label>
                        <input type="number" id="cost" value="0" class="w-full p-2.5 rounded-xl border border-slate-200 text-sm focus:ring-2 focus:ring-primary/20 outline-none">
                    </div>
                </div>
                <div class="flex justify-end gap-2 pt-3 border-t border-slate-100">
                    <button type="button" onclick="closeModal('jobModal')" class="px-4 py-2 rounded-xl border border-slate-200 text-xs font-semibold text-slate-600 hover:bg-slate-50">ยกเลิก</button>
                    <button type="submit" class="px-4 py-2 rounded-xl bg-primary hover:bg-indigo-700 text-white text-xs font-semibold shadow-sm">บันทึกข้อมูลงาน</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Modal: ใบเสร็จ / รายงานส่งลูกค้า -->
    <div id="invoiceModal" class="hidden fixed inset-0 bg-black/50 backdrop-blur-sm z-50 flex items-center justify-center p-4 overflow-y-auto">
        <div class="bg-white rounded-2xl max-w-sm w-full p-5 shadow-2xl relative border border-slate-100">
            <button type="button" onclick="closeModal('invoiceModal')" class="absolute top-4 right-4 text-slate-400 hover:text-slate-600"><i class="fa-solid fa-xmark text-xl"></i></button>
            
            <div id="printArea" class="bg-white p-3 rounded-xl border border-slate-100 space-y-4">
                <div class="text-center pb-3 border-b-2 border-dashed border-slate-200">
                    <h2 class="text-sm font-black text-slate-900 tracking-tight">T&K ELECTRICAL APPLIANCE REPAIR CENTER</h2>
                    <p class="text-[9px] text-primary font-bold uppercase tracking-wider mt-0.5">One-stop service (สุรินทร์ ทุกอำเภอ)</p>
